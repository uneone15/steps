
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap');
body { font-family: 'Nanum Gothic', sans-serif; }
.wf-wrap { padding: 0 8px 2.5rem; }
.sec-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--color-text-tertiary); text-transform: uppercase; margin: 2rem 0 0.75rem; }
.phone-row { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; }
.phone-row::-webkit-scrollbar { display: none; }

.phone {
  width: 180px; flex: 0 0 180px;
  border-radius: 26px;
  border: 2px solid var(--color-border-secondary);
  overflow: hidden;
  display: flex; flex-direction: column;
  background: var(--color-background-primary);
  position: relative;
}
.notch-bar { height: 18px; display: flex; align-items: center; justify-content: center; }
.notch-pill { width: 44px; height: 6px; border-radius: 99px; }

/* HOME BG */
.home-screen {
  background: #6B6B9A;
  flex: 1; min-height: 370px;
  display: flex; flex-direction: column;
  padding: 10px 12px 0;
  position: relative;
}
.home-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.h-icon { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.18); display: flex; align-items: center; justify-content: center; }
.h-icon i { font-size: 11px; color: #fff; }
.h-icons { display: flex; gap: 5px; }
.home-title { text-align: center; color: #fff; font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.home-sub { text-align: center; color: rgba(255,255,255,0.6); font-size: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 3px; }

.dot-indicator { display: flex; justify-content: center; gap: 4px; margin-bottom: 10px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.3); }
.dot.active { background: #fff; width: 14px; border-radius: 99px; }

.slide-nav-row { display: flex; align-items: center; justify-content: space-between; padding: 0 4px; margin-bottom: 8px; }
.slide-arrow { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.18); display: flex; align-items: center; justify-content: center; }
.slide-arrow i { font-size: 12px; color: #fff; }
.slide-counter { font-size: 8px; color: rgba(255,255,255,0.7); }

.book-card { flex: 1; display: flex; align-items: center; justify-content: center; padding-bottom: 52px; }
.book-obj { width: 100px; height: 132px; border-radius: 4px 12px 12px 4px; position: relative; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 14px; }
.book-spine { position: absolute; left: 0; top: 0; bottom: 0; width: 9px; border-radius: 4px 0 0 4px; }
.book-label { color: rgba(255,255,255,0.85); font-size: 10px; font-weight: 700; }
.book-sub { color: rgba(255,255,255,0.55); font-size: 7px; margin-top: 2px; }
.book-badge { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; }
.book-badge i { font-size: 9px; color: #fff; }

.more-book-card { width: 100px; height: 132px; border-radius: 12px; border: 2px dashed rgba(255,255,255,0.35); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
.more-book-card i { font-size: 18px; color: rgba(255,255,255,0.6); }
.more-book-card span { font-size: 8px; color: rgba(255,255,255,0.7); font-weight: 700; }
.more-btn-pill { margin-top: 6px; background: rgba(255,255,255,0.18); border-radius: 99px; padding: 4px 14px; display: flex; align-items: center; gap: 4px; }
.more-btn-pill span { font-size: 8px; color: #fff; font-weight: 700; }
.more-btn-pill i { font-size: 10px; color: #fff; }

/* FLOATING + BTN — sits inside the phone, above bottom bar */
.fab-wrap {
  position: absolute;
  bottom: 48px;
  right: 14px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  z-index: 10;
}
.fab {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.22);
}
.fab i { font-size: 18px; color: #6B6B9A; }
.fab-label { font-size: 6.5px; color: rgba(255,255,255,0.75); white-space: nowrap; }

/* BOTTOM HOME BAR (no icons, just home indicator line) */
.home-bar {
  background: #6B6B9A;
  height: 38px;
  display: flex; align-items: center; justify-content: center;
}
.home-indicator { width: 44px; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.35); }

/* CREATE PAGE */
.create-screen {
  background: #F5F3EE;
  flex: 1; min-height: 370px;
  display: flex; flex-direction: column;
}
.create-header {
  background: #F5F3EE;
  padding: 10px 12px 8px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 0.5px solid #ddd;
}
.create-header i { font-size: 14px; color: #555; }
.create-header-title { font-size: 11px; font-weight: 700; color: #333; }
.create-body { flex: 1; padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }

/* upload zone */
.upload-zone {
  border: 1.5px dashed #B4B2A9;
  border-radius: 12px;
  height: 80px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  background: #FEFEFE;
}
.upload-zone i { font-size: 20px; color: #B4B2A9; }
.upload-zone span { font-size: 8px; color: #B4B2A9; font-weight: 700; }
.upload-zone small { font-size: 7px; color: #ccc; }

/* preview strip */
.preview-strip { display: flex; gap: 5px; }
.preview-thumb { width: 38px; height: 38px; border-radius: 8px; background: #D3D1C7; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.preview-thumb.add { background: #EEEDFE; border: 1.5px dashed #AFA9EC; }
.preview-thumb.add i { font-size: 14px; color: #AFA9EC; }

.field-label { font-size: 8px; font-weight: 700; color: #888; margin-bottom: 3px; }
.field-box { background: #FEFEFE; border: 0.5px solid #ddd; border-radius: 8px; padding: 6px 8px; font-size: 8.5px; color: #aaa; display: flex; align-items: center; gap: 5px; }
.field-box i { font-size: 11px; color: #ccc; }

.exif-badge-row { display: flex; gap: 4px; flex-wrap: wrap; }
.exif-badge { font-size: 7px; padding: 2px 6px; border-radius: 99px; background: #EEEDFE; color: #534AB7; font-weight: 700; display: flex; align-items: center; gap: 2px; }
.exif-badge i { font-size: 8px; }

.cta-create {
  margin-top: auto;
  background: #6B6B9A; color: #fff;
  font-size: 9px; font-weight: 700;
  text-align: center; padding: 8px 0;
  border-radius: 99px;
}

/* bottom bar for create page (white) */
.white-bar {
  background: var(--color-background-primary);
  height: 38px; display: flex; align-items: center; justify-content: center;
  border-top: 0.5px solid var(--color-border-tertiary);
}
.white-indicator { width: 44px; height: 4px; border-radius: 99px; background: var(--color-border-secondary); }

/* flow connector */
.flow-arrow { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding-top: 80px; flex-shrink: 0; }
.flow-arrow i { font-size: 18px; color: var(--color-text-tertiary); }
.flow-arrow span { font-size: 7.5px; color: var(--color-text-tertiary); white-space: nowrap; font-weight: 700; }
</style>
